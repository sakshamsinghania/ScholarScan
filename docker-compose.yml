version: "3.9"

# =============================================================================
# ScholarScan — full stack (Phase 2 + 3)
# =============================================================================
# Quick start:
#   cp .env.example .env          # fill in GROQ_API_KEY + JWT_SECRET_KEY
#   docker compose up --build
#
# Web:    http://localhost:5050
# Flower: http://localhost:5555
# =============================================================================

x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg://scholarscan:scholarscan@postgres:5432/scholarscan
  REDIS_URL: redis://redis:6379/0
  USE_CELERY: "true"
  FLASK_DEBUG: "false"
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
  AUTH_REQUIRED: "true"
  CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
  UPLOAD_FOLDER: /app/uploads
  LLM_CACHE_PATH: /app/uploads/groq-cache.json

services:
  # ---------------------------------------------------------------------------
  postgres:
  # ---------------------------------------------------------------------------
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scholarscan
      POSTGRES_USER: scholarscan
      POSTGRES_PASSWORD: scholarscan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarscan"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  redis:
  # ---------------------------------------------------------------------------
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  migrate:
  # ---------------------------------------------------------------------------
    build:
      context: backend
      dockerfile: ../Dockerfile
    environment: *backend-env
    command: >
      sh -c "cd /app && alembic upgrade head"
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  web:
  # ---------------------------------------------------------------------------
    build:
      context: backend
      dockerfile: ../Dockerfile
    restart: unless-stopped
    environment: *backend-env
    ports:
      - "5050:5050"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      gunicorn app:create_app()
        --bind 0.0.0.0:5050
        --worker-class gevent
        --workers 4
        --worker-connections 1000
        --timeout 120
        --preload

  # ---------------------------------------------------------------------------
  worker:
  # ---------------------------------------------------------------------------
    build:
      context: backend
      dockerfile: ../Dockerfile.worker
    restart: unless-stopped
    environment: *backend-env
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: >
      celery -A workers.celery_app.celery worker
        --loglevel=info
        --concurrency=2
        --queues=celery

  # ---------------------------------------------------------------------------
  flower:
  # ---------------------------------------------------------------------------
    build:
      context: backend
      dockerfile: ../Dockerfile.worker
    restart: unless-stopped
    environment: *backend-env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: >
      celery -A workers.celery_app.celery flower
        --port=5555
        --broker=${REDIS_URL:-redis://redis:6379/0}

volumes:
  postgres_data:
  uploads:
